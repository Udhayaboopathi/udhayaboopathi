<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0 L0 0 0 50" fill="none" stroke="#00f5ff" stroke-width="0.4" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>
  <rect width="1200" height="280" fill="url(#accent)" opacity="0.04"/>

  <!-- Glass card -->
  <rect x="80" y="36" width="1040" height="200" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(0,245,255,0.25)" stroke-width="1"/>
  <rect x="80" y="36" width="1040" height="3" rx="1.5" fill="url(#accent)" opacity="0.7"/>

  <!-- Inset corner accents (inside card) -->
  <path d="M96,52 L136,52" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
  <path d="M96,52 L96,92" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
  <path d="M1104,220 L1064,220" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
  <path d="M1104,220 L1104,180" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.45" stroke-linecap="round"/>

  <!-- Avatar -->
  <circle cx="180" cy="132" r="50" fill="none" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="132" r="42" fill="rgba(0,245,255,0.08)"/>
  <text x="180" y="144" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="38" font-weight="700" fill="#00f5ff" filter="url(#glow)">U</text>

  <!-- Text -->
  <text x="270" y="108" font-family="Segoe UI,Arial,sans-serif" font-size="42" font-weight="700" fill="#ffffff">Udhayaboopathi</text>
  <text x="270" y="142" font-family="Segoe UI,Arial,sans-serif" font-size="19" fill="#39ff14">Full Stack &amp; DevOps Engineer</text>
  <text x="270" y="168" font-family="monospace" font-size="13" fill="#8892b0">Chennai, Tamil Nadu, India | udhayaboopathi.tech</text>
  <text x="270" y="190" font-family="monospace" font-size="12" fill="#00f5ff">M.Sc Computer Science - Periyar University (2026)</text>
  <circle cx="270" cy="210" r="4" fill="#39ff14">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="283" y="214" font-family="monospace" font-size="12" fill="#39ff14">Developer @ TNTEU Chennai</text>

  <!-- Bottom wave -->
  <path fill="rgba(0,245,255,0.06)">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      values="M0,240 C300,210 600,270 900,240 C1050,225 1150,250 1200,240 L1200,280 L0,280 Z;
              M0,240 C300,270 600,210 900,240 C1050,255 1150,230 1200,240 L1200,280 L0,280 Z;
              M0,240 C300,210 600,270 900,240 C1050,225 1150,250 1200,240 L1200,280 L0,280 Z"/>
  </path>
</svg>
