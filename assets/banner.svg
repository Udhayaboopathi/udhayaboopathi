<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0 L0 0 0 50" fill="none" stroke="#00f5ff" stroke-width="0.4" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>

  <!-- Subtle gradient overlay -->
  <rect width="1200" height="280" fill="url(#accent)" opacity="0.04"/>

  <!-- Glass card -->
  <rect x="80" y="40" width="1040" height="180" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(0,245,255,0.25)" stroke-width="1"/>

  <!-- Accent line top -->
  <rect x="80" y="40" width="1040" height="3" rx="1.5" fill="url(#accent)" opacity="0.7"/>

  <!-- Avatar ring -->
  <circle cx="180" cy="130" r="52" fill="none" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="130" r="44" fill="rgba(0,245,255,0.08)"/>
  <text x="180" y="142" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="40" font-weight="700" fill="#00f5ff" filter="url(#glow)">U</text>

  <!-- Title -->
  <text x="270" y="115" font-family="Segoe UI,Arial,sans-serif" font-size="44" font-weight="700" fill="#ffffff">Udhayaboopathi</text>
  <text x="270" y="152" font-family="Segoe UI,Arial,sans-serif" font-size="20" fill="#39ff14">Full Stack &amp; DevOps Engineer</text>
  <text x="270" y="182" font-family="monospace" font-size="14" fill="#8892b0">Salem, Tamil Nadu, India | udhayaboopathi.tech</text>

  <!-- Status dot -->
  <circle cx="270" cy="205" r="5" fill="#39ff14">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="285" y="210" font-family="monospace" font-size="12" fill="#39ff14">Available for opportunities</text>

  <!-- Corner brackets -->
  <path d="M80,40 L110,40 L110,70" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.6"/>
  <path d="M1120,220 L1120,250 L1090,250" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.6"/>

  <!-- Bottom wave -->
  <path fill="rgba(0,245,255,0.06)">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      values="M0,240 C300,210 600,270 900,240 C1050,225 1150,250 1200,240 L1200,280 L0,280 Z;
              M0,240 C300,270 600,210 900,240 C1050,255 1150,230 1200,240 L1200,280 L0,280 Z;
              M0,240 C300,210 600,270 900,240 C1050,225 1150,250 1200,240 L1200,280 L0,280 Z"/>
  </path>
</svg>
