<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f">
        <animate attributeName="stop-color" values="#0a0a0f;#0d1117;#0a0a0f" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#161b22;#0d1117" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#161b22">
        <animate attributeName="stop-color" values="#161b22;#0a0a0f;#161b22" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff00ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff00ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39ff14" stop-opacity="1"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glassBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f5ff" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <clipPath id="waveClip">
      <path d="M0,280 Q300,240 600,280 T1200,280 L1200,320 L0,320 Z">
        <animate attributeName="d"
          values="M0,280 Q300,240 600,280 T1200,280 L1200,320 L0,320 Z;
                  M0,280 Q300,300 600,260 T1200,280 L1200,320 L0,320 Z;
                  M0,280 Q300,240 600,280 T1200,280 L1200,320 L0,320 Z"
          dur="6s" repeatCount="indefinite"/>
      </path>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#neonCyan)" opacity="0.4">
    <animate attributeName="y" values="0;320;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <g opacity="0.6">
    <circle cx="100" cy="80" r="2" fill="#00f5ff">
      <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="120" r="1.5" fill="#ff00ff">
      <animate attributeName="cy" values="120;100;120" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="60" r="2" fill="#39ff14">
      <animate attributeName="cy" values="60;90;60" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="100" r="1.5" fill="#00f5ff">
      <animate attributeName="cy" values="100;70;100" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="70" r="2" fill="#ff00ff">
      <animate attributeName="cy" values="70;110;70" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Neon horizontal lines -->
  <line x1="0" y1="50" x2="1200" y2="50" stroke="url(#neonCyan)" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="270" x2="1200" y2="270" stroke="url(#neonPink)" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Glassmorphism card -->
  <g filter="url(#glow)">
    <rect x="200" y="60" width="800" height="180" rx="20" ry="20"
          fill="rgba(255,255,255,0.03)" stroke="rgba(0,245,255,0.3)" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="200" y="60" width="800" height="180" rx="20" ry="20"
          fill="rgba(0,245,255,0.02)" opacity="0.5"/>
  </g>

  <!-- Logo circle -->
  <circle cx="280" cy="150" r="45" fill="none" stroke="#00f5ff" stroke-width="2" filter="url(#glow)">
    <animate attributeName="r" values="43;47;43" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="280" y="160" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="#00f5ff" filter="url(#glow)">U</text>

  <!-- Main title -->
  <text x="360" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" filter="url(#glow)">
    Udhayaboopathi
    <animate attributeName="fill" values="#ffffff;#00f5ff;#ffffff" dur="6s" repeatCount="indefinite"/>
  </text>
  <text x="360" y="170" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#39ff14" opacity="0.9">
    Full Stack &amp; DevOps Engineer
  </text>
  <text x="360" y="200" font-family="monospace" font-size="14" fill="#8892b0">
    Salem, Tamil Nadu, India  •  udhayaboopathi.tech
  </text>

  <!-- Animated code brackets -->
  <text x="360" y="225" font-family="monospace" font-size="13" fill="#ff00ff" opacity="0.8">
    &lt; build scalable production systems /&gt;
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Corner accents -->
  <polyline points="200,60 230,60 230,90" fill="none" stroke="#39ff14" stroke-width="2" opacity="0.7"/>
  <polyline points="1000,240 1000,270 970,270" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.7"/>
  <polyline points="970,60 1000,60 1000,90" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.7"/>
  <polyline points="200,240 230,240 230,270" fill="none" stroke="#39ff14" stroke-width="2" opacity="0.7"/>

  <!-- Animated wave at bottom -->
  <path d="M0,290 C200,260 400,320 600,290 C800,260 1000,320 1200,290 L1200,320 L0,320 Z" fill="rgba(0,245,255,0.08)">
    <animate attributeName="d"
      values="M0,290 C200,260 400,320 600,290 C800,260 1000,320 1200,290 L1200,320 L0,320 Z;
              M0,290 C200,320 400,260 600,290 C800,320 1000,260 1200,290 L1200,320 L0,320 Z;
              M0,290 C200,260 400,320 600,290 C800,260 1000,320 1200,290 L1200,320 L0,320 Z"
      dur="5s" repeatCount="indefinite"/>
  </path>
  <path d="M0,300 C300,270 600,330 900,300 C1050,285 1150,310 1200,300 L1200,320 L0,320 Z" fill="rgba(255,0,255,0.05)">
    <animate attributeName="d"
      values="M0,300 C300,270 600,330 900,300 C1050,285 1150,310 1200,300 L1200,320 L0,320 Z;
              M0,300 C300,330 600,270 900,300 C1050,315 1150,290 1200,300 L1200,320 L0,320 Z;
              M0,300 C300,270 600,330 900,300 C1050,285 1150,310 1200,300 L1200,320 L0,320 Z"
      dur="7s" repeatCount="indefinite"/>
  </path>
</svg>
