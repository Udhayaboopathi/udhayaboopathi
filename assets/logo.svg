<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#0a0a0f" rx="100"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#g)" stroke-width="2" filter="url(#gl)">
    <animate attributeName="r" values="86;90;86" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="72" fill="rgba(0,245,255,0.06)"/>
  <text x="100" y="118" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="64" font-weight="800" fill="url(#g)" filter="url(#gl)">U</text>
</svg>
