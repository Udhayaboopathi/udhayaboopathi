name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: Udhayaboopathi
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: large
          config_anim: typing
          config_time: relative
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 8
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_timestamps: yes
          plugin_calendar: yes
          plugin_calendar_limit: 1
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_gists: yes
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_introduction: yes
          plugin_introduction_title: yes
          plugin_introduction_base: header, repository, community
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_lines: yes
          plugin_lines_sections: base, history
          plugin_lines_history_limit: 1
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit, pull-request, issue
          plugin_notable_limit: 4
          plugin_people: yes
          plugin_people_limit: 4
          plugin_people_size: 28
          plugin_people_types: followers, following
          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_display: absolute
          plugin_reactions_ignored: ok, eyes
          plugin_stargazers: yes
          plugin_stargazers_limit: 4
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_traffic: yes
          plugin_traffic_pages: yes
          plugin_traffic_referrer: yes
          plugin_tweets: yes
          plugin_tweets_limit: 2
          plugin_wakatime: yes
          plugin_wakatime_sections: type, activity, languages, editors, os
          plugin_wakatime_limit: 5
          plugin_wakatime_url: https://wakatime.com
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_ignored_languages: >-
            JSON, YAML, TOML, XML, Markdown, Text
          plugin_wakatime_ignored_projects: >-
            udhayaboopathi/udhayaboopathi
          plugin_wakatime_ignored_repositories: >-
            udhayaboopathi/udhayaboopathi

      - name: Commit and push metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          committer: github-metrics[bot]
          committer_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "chore: update GitHub metrics"
          commit_branch: github-metrics
          commit_files: |
            github-metrics.svg
            github-metrics.json
